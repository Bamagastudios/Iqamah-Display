name: Build APK

# Builds a sideloadable debug APK for the TV app and publishes it as a downloadable
# artifact. No Android Studio needed — download "masjid-tv-apk" from the run, then
# sideload it on the Fire TV (see INSTALL.md).

on:
  push:
    branches: ['claude/keen-hopper-w4hlyo', 'main']
    paths:
      - 'apps/tv/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build -w apps/tv

      - name: Capacitor sync
        working-directory: apps/tv
        run: npx cap sync android

      - name: Build debug APK
        working-directory: apps/tv/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: masjid-tv-apk
          path: apps/tv/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Publish the APK as a release asset so it has a stable public download URL
      # (works with the Fire TV "Downloader" app once the repo is public).
      - name: Publish APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tv
          name: Masjid TV — latest APK
          body: Sideloadable Fire TV / Android TV build. Download app-debug.apk below.
          files: apps/tv/android/app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: true
